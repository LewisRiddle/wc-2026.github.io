<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OrbitRemit World Cup 2026 Sweepstakes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* OrbitRemit palette - teal #1AB5CB sampled from the house template */
  --paper:#EDF4F6; --card:#FFFFFF; --ink:#0B2230; --ink-soft:#557080;
  --line:#DDE9ED; --pitch:#1AB5CB; --pitch-dark:#0E8A9B; --gold:#F2B705;
  --ai:#6A4C93; --miss:#C2410C; --hitbg:#E4F6F9; --missbg:#FBEFE8;
  --shadow:0 1px 2px rgba(11,34,48,.06),0 8px 24px rgba(11,34,48,.06);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--paper);color:var(--ink);
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  font-feature-settings:"tnum" 1;line-height:1.45;-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto;padding:18px 16px 64px}
.top{display:flex;flex-wrap:wrap;align-items:flex-end;gap:10px 18px;
  border-bottom:3px solid var(--pitch);padding-bottom:14px;margin-bottom:18px}
.brandrow{display:flex;align-items:center;gap:14px}
.orbit{position:relative;width:54px;height:54px;flex:none}
.orbit::before{content:"";position:absolute;inset:0;border:2.5px solid var(--pitch);border-radius:50%;opacity:.9}
.orbit .planet{position:absolute;inset:15px;background:var(--ink);border-radius:50%}
.orbit .sat{position:absolute;top:50%;left:50%;width:9px;height:9px;margin:-4.5px;background:var(--pitch);
  border-radius:50%;transform:rotate(-35deg) translateX(27px)}
@media (prefers-reduced-motion:no-preference){
  .orbit .sat{animation:orb 7s linear infinite}
  @keyframes orb{from{transform:rotate(0deg) translateX(27px)}to{transform:rotate(360deg) translateX(27px)}}
}
.brand{font-family:Anton;font-weight:400;line-height:.9;letter-spacing:.5px;
  font-size:clamp(30px,7vw,52px);text-transform:uppercase;margin:0}
.brand .y{color:var(--pitch)}
.kick{font-size:13px;color:var(--ink-soft);margin:2px 0 0}
.status{margin-left:auto;text-align:right;font-size:12.5px;color:var(--ink-soft)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--pitch);
  margin-right:6px;vertical-align:middle;animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(14,161,90,.5)}70%{box-shadow:0 0 0 7px rgba(14,161,90,0)}100%{box-shadow:0 0 0 0 rgba(14,161,90,0)}}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
  font:600 13px Inter;padding:9px 14px;border-radius:999px;cursor:pointer}
.tab[aria-selected=true]{background:var(--ink);color:#fff;border-color:var(--ink)}
.tab:focus-visible{outline:3px solid var(--pitch);outline-offset:2px}
.section-title{font:800 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 10px}
.race{display:flex;flex-direction:column;gap:8px;margin-bottom:26px}
.lane{display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow);
  cursor:pointer;transition:transform .12s ease,border-color .12s;text-align:left}
.lane:hover{transform:translateY(-1px);border-color:#cfd8e6}
.lane:focus-visible{outline:3px solid var(--pitch);outline-offset:2px}
.rank{font-family:Anton;font-size:26px;text-align:center;line-height:1}
.lane.lead .rank{color:var(--gold)}
.lane.bench{border-style:dashed}
.who{min-width:0}
.nm{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tag{display:inline-block;font:700 9.5px Inter;letter-spacing:.08em;text-transform:uppercase;
  color:#fff;background:var(--ai);border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:1px}
.barwrap{height:9px;background:#EDF1F7;border-radius:999px;overflow:hidden;margin-top:7px}
.bar{height:100%;background:linear-gradient(90deg,var(--pitch),var(--pitch-dark));border-radius:999px;width:0;
  transition:width .9s cubic-bezier(.2,.7,.2,1)}
.lane.lead .bar{background:linear-gradient(90deg,#FFD34D,var(--gold))}
.lane.bench .bar{background:linear-gradient(90deg,#9B7FC2,var(--ai))}
.score{text-align:right;line-height:1}
.pts{font-family:Anton;font-size:24px}
.hits{font-size:11px;color:var(--ink-soft)}
/* picks grid */
.gridwrap{overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
table.pg{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:12px}
.pg th,.pg td{padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
.pg thead th{position:sticky;top:0;background:var(--ink);color:#fff;font:700 11px Inter;z-index:3;text-align:left}
.pg thead th.pl{writing-mode:initial;min-width:84px}
.pg td.match{position:sticky;left:0;background:var(--card);z-index:2;border-right:2px solid var(--line);max-width:230px;overflow:hidden;text-overflow:ellipsis}
.pg thead th.matchh{position:sticky;left:0;z-index:4;background:var(--ink)}
.pg tr.done td.match{background:#F7FAF8}
.pg .mt{font-weight:600}
.pg .ms{color:var(--ink-soft);font-size:10.5px}
.pg td.pk{text-align:center;color:var(--ink-soft)}
.pg td.pk.hit{background:var(--hitbg);color:var(--pitch-dark);font-weight:700}
.pg td.pk.miss{background:var(--missbg);color:var(--miss);text-decoration:line-through}
.pg td.pk.draw{font-style:italic}
.pg tr.stagehdr td{background:#F1F4F9;font:800 10.5px Inter;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);position:sticky;left:0}
.legend{display:flex;gap:14px;align-items:center;font-size:11.5px;color:var(--ink-soft);margin:10px 2px 18px;flex-wrap:wrap}
.sw{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-2px;margin-right:5px}
/* fixtures */
.md{font:800 11px Inter;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);
  margin:20px 0 8px;display:flex;align-items:center;gap:10px}
.md::after{content:"";flex:1;height:1px;background:var(--line)}
.fx{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
  border-radius:10px;padding:9px 12px;margin-bottom:6px;box-shadow:var(--shadow);flex-wrap:wrap}
.fx .gp{font:700 11px Inter;color:var(--ink-soft);width:18px;flex:none}
.fx .teams{flex:1;min-width:200px;font-size:14px}
.fx .teams .t{font-weight:600}
.fx .teams .t.win{color:var(--pitch-dark)}
.fx .teams .t.win::after{content:" \2714";font-size:11px}
.fx .vs{color:var(--ink-soft);font-size:12px;margin:0 6px}
.fx .meta{text-align:right;font-size:11px;color:var(--ink-soft);flex:none;margin-left:auto}
.fx .res{font:700 11px Inter;color:var(--pitch);text-transform:uppercase;letter-spacing:.04em}
.fx .pend{font:600 11px Inter;color:var(--ink-soft)}
.fx .gotit{display:block;font-size:10.5px;color:var(--ink-soft)}
.drawpill{font:700 10px Inter;color:var(--ink);background:#FBE7A3;border-radius:5px;padding:1px 6px}
.adminbar{background:#0A1A2F;color:#fff;border-radius:12px;padding:14px 16px;margin-bottom:18px}
.adminbar h3{margin:0 0 4px;font:800 13px Inter;letter-spacing:.06em;text-transform:uppercase}
.adminbar p{margin:0;font-size:12.5px;color:#AEBBD0}
.adminbar .btns{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.btn{appearance:none;border:0;border-radius:8px;padding:8px 12px;font:700 12.5px Inter;cursor:pointer;background:var(--pitch);color:#fff}
.btn.ghost{background:#1C3252;color:#fff}
.btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex:none}
.seg button{appearance:none;border:0;background:var(--card);color:var(--ink-soft);font:600 11px Inter;
  padding:6px 9px;cursor:pointer;border-left:1px solid var(--line)}
.seg button:first-child{border-left:0}
.seg button[aria-pressed=true]{background:var(--ink);color:#fff}
.seg button.d[aria-pressed=true]{background:var(--gold);color:var(--ink)}
dialog{border:0;border-radius:16px;padding:0;max-width:560px;width:92vw;box-shadow:0 20px 60px rgba(10,26,47,.3)}
dialog::backdrop{background:rgba(10,26,47,.45)}
.mhead{background:var(--ink);color:#fff;padding:16px 18px;display:flex;justify-content:space-between;align-items:center}
.mhead .nm{font-family:Anton;font-size:22px}
.mhead button{appearance:none;background:#1C3252;border:0;color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;font:700 12px Inter}
.mbody{padding:14px 18px;max-height:62vh;overflow:auto}
.prow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
.prow .g{width:40px;color:var(--ink-soft);font-weight:600;flex:none}
.prow .p{flex:1;min-width:0}
.prow .o{font:700 11px Inter;text-transform:uppercase;letter-spacing:.04em;flex:none}
.o.hit{color:var(--pitch-dark)} .o.miss{color:var(--miss)} .o.tbd{color:var(--ink-soft)}
.foot{margin-top:30px;border-top:1px solid var(--line);padding-top:14px;font-size:12px;color:var(--ink-soft)}
@media (max-width:560px){.status{margin-left:0;text-align:left;width:100%}.pts{font-size:20px}.rank{font-size:22px}}
@media (prefers-reduced-motion:reduce){.bar{transition:none}.dot{animation:none}}
</style>
</head>

      <span><span class="sw" style="background:var(--missbg);border:1px solid #F0CDBB"></span>Missed</span>
      <span><span class="sw" style="background:#fff;border:1px solid var(--line)"></span>Not played yet</span>
      <span>Scroll sideways for all players \u2192</span>

    <div class="gridwrap" id="grid"></div>
  </section>

  <section id="panel-fixtures" role="tabpanel" hidden>
    <div id="fixtures"></div>
  </section>

  <p class="foot" id="foot"></p>
</div>

<dialog id="card">
  <div class="mhead"><span class="nm" id="card-name"></span><button id="card-close">Close</button></div>
  <div class="mbody" id="card-body"></div>
</dialog>

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const POINTS = DATA.points, FIX = DATA.fixtures, PLAYERS = DATA.players;
const fixByN = Object.fromEntries(FIX.map(f=>[f.n,f]));
const ADMIN = location.hash.toLowerCase().includes('admin');
const BAKED = {"1":"Mexico"}; // results known when this page was generated
let MANUAL = {};            // from results.json (highest priority)
let AUTO = {};              // detected live from ESPN scoreboard
let RESULTS = {...BAKED}, UPDATED = null, AUTO_STATE = 'off';
function mergeResults(){ RESULTS = {...BAKED, ...AUTO, ...MANUAL}; }

function standings(){
  const rows = PLAYERS.map(p=>{
    let pts=0,hits=0;
    for(const f of FIX){
      const res=RESULTS[f.n]; if(!res) continue;
      if(p.picks[String(f.n)]===res){ pts+=POINTS[f.stage]||0; hits++; }
    }
    return {name:p.name,benchmark:p.benchmark,pts,hits};
  });
  rows.sort((a,b)=> b.pts-a.pts || b.hits-a.hits || a.name.localeCompare(b.name));
  let rank=0,last=null,seen=0;
  for(const r of rows){ seen++; if(r.pts!==last){rank=seen;last=r.pts;} r.rank=rank; }
  return rows;
}

function renderStatus(){
  const scored = FIX.filter(f=>RESULTS[f.n]).length;
  const el=document.getElementById('status');
  const live = AUTO_STATE==='on' ? 'live results on' : AUTO_STATE==='unreachable' ? 'live feed unreachable, manual mode' : 'connecting\u2026';
  el.innerHTML='<span class="dot"></span>'+scored+' of 104 games scored &middot; '+live;
}
function timeAgo(d){const s=(Date.now()-d.getTime())/1000;if(s<90)return'just now';const m=Math.round(s/60);if(m<60)return m+' min ago';const h=Math.round(m/60);if(h<24)return h+' hr ago';return Math.round(h/24)+' d ago';}

function renderRace(){
  const rows=standings(); const max=Math.max(1,...rows.map(r=>r.pts));
  const race=document.getElementById('race');
  race.innerHTML='';
  rows.forEach(r=>{
    const lane=document.createElement('button');
    lane.className='lane'+(r.rank===1&&r.pts>0?' lead':'')+(r.benchmark?' bench':'');
    lane.setAttribute('aria-label',r.name+', rank '+r.rank+', '+r.pts+' points');
    lane.innerHTML=
      '<div class="rank">'+r.rank+'</div>'+
      '<div class="who"><div class="nm">'+esc(r.name)+(r.benchmark?'<span class="tag">Bench</span>':'')+
        '</div><div class="barwrap"><div class="bar" style="width:'+(max?r.pts/max*100:0)+'%"></div></div></div>'+
      '<div class="score"><div class="pts">'+r.pts+'</div><div class="hits">'+r.hits+' correct</div></div>';
    lane.addEventListener('click',()=>openCard(r.name));
    race.appendChild(lane);
  });
}

function renderGrid(){
  const host=document.getElementById('grid');
  let html='<table class="pg"><thead><tr><th class="matchh">Match</th>';
  for(const p of PLAYERS) html+='<th class="pl">'+esc(firstName(p.name))+(p.benchmark?' \uD83E\uDD16':'')+'</th>';
  html+='</tr></thead><tbody>';
  let curStage=null;
  for(const f of FIX){
    if(f.stage!==curStage){curStage=f.stage;
      html+='<tr class="stagehdr"><td colspan="'+(PLAYERS.length+1)+'">'+esc(f.stage)+'</td></tr>';}
    const res=RESULTS[f.n];
    html+='<tr class="'+(res?'done':'')+'"><td class="match"><span class="mt">'+esc(f.home)+' v '+esc(f.away)+'</span>'+
      '<br><span class="ms">'+(f.group?'Grp '+f.group+' \u00b7 ':'')+esc(dateLong(f.date))+(res?' \u00b7 <b>'+esc(res==='Draw'?'Draw':res)+'</b>':'')+'</span></td>';
    for(const p of PLAYERS){
      const pick=p.picks[String(f.n)]||'';
      let cls='pk'; if(pick==='Draw')cls+=' draw';
      if(res&&pick){cls+= pick===res?' hit':' miss';}
      html+='<td class="'+cls+'">'+esc(shorten(pick))+'</td>';
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  host.innerHTML=html;
}
function firstName(n){return n.split(' ')[0]==='AI'?'AI Picks':n.split(' ')[0];}
function shorten(t){if(!t)return'\u2014';const map={'Bosnia and Herzegovina':'Bosnia','South Africa':'S Africa','South Korea':'S Korea','New Zealand':'NZ','Saudi Arabia':'Saudi','Ivory Coast':'Ivory C.','Netherlands':'Neth.','Switzerland':'Switz.','Cape Verde':'C Verde','Uzbekistan':'Uzbek.','DR Congo':'DRC','Argentina':'Argent.','Portugal':'Portug.'};return map[t]||t;}

function renderFixtures(){
  const host=document.getElementById('fixtures'); host.innerHTML='';
  let curDate=null;
  for(const f of FIX){
    const dl=dateLong(f.date);
    if(dl!==curDate){curDate=dl;const h=document.createElement('div');h.className='md';
      h.textContent=dl+'  \u00b7  '+f.stage;host.appendChild(h);}
    const res=RESULTS[f.n];
    const side= res? (res==='Draw'?'D': res===f.home?'H':'A') : null;
    let gotit='';
    if(res){const n=PLAYERS.filter(p=>p.picks[String(f.n)]===res).length;gotit='<span class="gotit">'+n+' of '+PLAYERS.length+' called it</span>';}
    const fx=document.createElement('div');fx.className='fx';
    const hw=side==='H'?' win':'', aw=side==='A'?' win':'';
    fx.innerHTML='<div class="gp">'+(f.group||'')+'</div>'+
      '<div class="teams"><span class="t'+hw+'">'+esc(f.home)+'</span><span class="vs">v</span><span class="t'+aw+'">'+esc(f.away)+'</span>'+
      (res==='Draw'?' <span class="drawpill">Draw</span>':'')+'</div>'+
      '<div class="meta">'+(res?'<span class="res">Final</span>':'<span class="pend">'+timeShort(f.date)+'</span>')+gotit+'</div>';
    host.appendChild(fx);
    if(ADMIN) fx.appendChild(adminSeg(f));
  }
}
/* ---------- local-timezone display ----------
   Stored fixture strings (e.g. "Fri 12 Jun 7:00 AM") are NZ wall-clock.
   NZ has no DST in the Jun-Jul tournament window, so NZST is a fixed UTC+12.
   We parse to a true instant, then format with local Date methods so each
   viewer sees kickoffs in their own timezone, tagged with their tz abbrev. */
const MON_=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW_=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const NZ_OFFSET_MS=12*3600*1000; // NZST, UTC+12 (no DST Jun-Jul 2026)
function fixtureInstant(s){
  const m=String(s||'').match(/(\d{1,2})\s+([A-Za-z]{3})\s+(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if(!m)return null;
  const mon=MON_.indexOf(m[2][0].toUpperCase()+m[2].slice(1,3).toLowerCase());
  if(mon<0)return null;
  let hr=(+m[3])%12; if(/pm/i.test(m[5]))hr+=12;
  // NZ wall-clock -> UTC instant
  return new Date(Date.UTC(2026,mon,+m[1],hr,+m[4])-NZ_OFFSET_MS);
}
function localTime(d){let h=d.getHours();const ap=h>=12?'PM':'AM';h=h%12||12;
  return h+':'+String(d.getMinutes()).padStart(2,'0')+' '+ap;}
function dateLong(s){const d=fixtureInstant(s);
  return d? DOW_[d.getDay()]+' '+d.getDate()+' '+MON_[d.getMonth()]+' '+localTime(d) : (s||'');}
function timeShort(s){const d=fixtureInstant(s);
  return d? localTime(d) : (s||'').split(' ').slice(-2).join(' ');}

function adminSeg(f){
  const seg=document.createElement('div');seg.className='seg';
  const mk=(label,val,cls)=>{const b=document.createElement('button');if(cls)b.className=cls;b.textContent=label;
    b.setAttribute('aria-pressed', RESULTS[f.n]===val);
    b.onclick=()=>{ if(MANUAL[f.n]===val){delete MANUAL[f.n];}else{MANUAL[f.n]=val;} UPDATED=new Date().toISOString(); mergeResults(); rerender();};return b;};
  seg.appendChild(mk(short(f.home),f.home));
  seg.appendChild(mk('Draw','Draw','d'));
  seg.appendChild(mk(short(f.away),f.away));
  return seg;
}
function short(t){return (t||'').length>10?t.slice(0,9)+'\u2026':t;}

function openCard(name){
  const p=PLAYERS.find(x=>x.name===name);
  document.getElementById('card-name').textContent=name;
  const st=standings().find(r=>r.name===name);
  let html='<div class="prow" style="border:0"><div class="g"></div><div class="p"><b>'+st.pts+' pts</b> &middot; '+st.hits+' correct &middot; rank '+st.rank+'</div></div>';
  for(const f of FIX){
    const pick=p.picks[String(f.n)]; if(!pick) continue;
    const res=RESULTS[f.n];
    let cls='tbd';
    if(res){ cls= pick===res?'hit':'miss'; }
    html+='<div class="prow"><div class="g">'+(f.group||f.stage.slice(0,3))+'</div>'+
      '<div class="p">'+esc(f.home)+' v '+esc(f.away)+'</div>'+
      '<div class="o '+cls+'">'+esc(pick)+(res?(cls==='hit'?' \u2714':' \u2717'):'')+'</div></div>';
  }
  document.getElementById('card-body').innerHTML=html;
  document.getElementById('card').showModal();
}

function renderAdmin(){
  if(!ADMIN) return;
  const el=document.getElementById('admin');
  el.innerHTML='<div class="adminbar"><h3>Admin mode</h3>'+
    '<p>Set each result on the Fixtures tab. When done, export and replace <b>results.json</b> next to this page so everyone sees it.</p>'+
    '<div class="btns"><button class="btn" id="exp">Download results.json</button>'+
    '<button class="btn ghost" id="cpy">Copy results.json</button>'+
    '<button class="btn ghost" id="clr">Clear all</button></div></div>';
  document.getElementById('exp').onclick=()=>{const blob=new Blob([resultsJSON()],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='results.json';a.click();};
  document.getElementById('cpy').onclick=async()=>{try{await navigator.clipboard.writeText(resultsJSON());document.getElementById('cpy').textContent='Copied';setTimeout(()=>document.getElementById('cpy').textContent='Copy results.json',1500);}catch(e){}};
  document.getElementById('clr').onclick=()=>{MANUAL={};UPDATED=new Date().toISOString();mergeResults();rerender();};
}
function resultsJSON(){return JSON.stringify({updated:new Date().toISOString(),results:RESULTS},null,2);}

function rerender(){renderStatus();renderRace();renderGrid();renderFixtures();}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

const tabs=[['tab-standings','panel-standings'],['tab-grid','panel-grid'],['tab-fixtures','panel-fixtures']];
tabs.forEach(([t,pn])=>document.getElementById(t).addEventListener('click',()=>{
  tabs.forEach(([tt,pp])=>{document.getElementById(tt).setAttribute('aria-selected', tt===t);document.getElementById(pp).hidden = pp!==pn;});
}));
document.getElementById('card-close').onclick=()=>document.getElementById('card').close();

async function loadResults(){
  try{const r=await fetch('results.json',{cache:'no-store'});
    if(r.ok){const j=await r.json(); MANUAL=j.results||{}; UPDATED=j.updated||null;}}catch(e){/* no file (preview/local) */}
  mergeResults(); rerender(); renderAdmin();
}

/* ---------- live auto results (ESPN public scoreboard, no key needed) ---------- */
function deburr(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
const ALIASES={'korea republic':'south korea','czech republic':'czechia','turkey':'turkiye',
  "cote d'ivoire":'ivory coast','cabo verde':'cape verde','democratic republic of the congo':'dr congo',
  'congo dr':'dr congo','usa':'usa','united states':'usa','ir iran':'iran','china pr':'china'};
function normName(s){let n=deburr(String(s||'')).toLowerCase().trim();return ALIASES[n]||n;}
const pairKey=(a,b)=>[normName(a),normName(b)].sort().join('|');
const FIX_BY_PAIR={}; for(const f of FIX){ if(!String(f.home).startsWith('Winner')&&!String(f.home).startsWith('Runner')&&!String(f.home).startsWith('Loser')&&!String(f.home).includes('3rd')) FIX_BY_PAIR[pairKey(f.home,f.away)]=f; }

function etDates(){ // tournament dates from 11 Jun up to 'today' in US Eastern (UTC-4)
  const out=[]; const now=new Date(Date.now()-4*3600*1000);
  let d=new Date(Date.UTC(2026,5,11));
  const end=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()));
  while(d<=end){ out.push(d.toISOString().slice(0,10).replace(/-/g,'')); d=new Date(d.getTime()+86400000); }
  return out.slice(-45);
}
async function pollESPN(backfill){
  const dates = backfill? etDates() : etDates().slice(-2); // backfill once, then just today/yesterday
  let changed=false, sawAny=false;
  for(const ds of dates){
    // skip dates where nothing is unresolved? cheap enough to just fetch the last 2 normally
    try{
      const r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates='+ds,{cache:'no-store'});
      if(!r.ok) continue; sawAny=true;
      const j=await r.json();
      for(const ev of (j.events||[])){
        const comp=(ev.competitions||[])[0]; if(!comp) continue;
        const done = comp.status && comp.status.type && comp.status.type.completed;
        if(!done) continue;
        const cs=comp.competitors||[]; if(cs.length!==2) continue;
        const names=cs.map(c=>c.team && (c.team.displayName||c.team.name)||'');
        const f=FIX_BY_PAIR[pairKey(names[0],names[1])]; if(!f) continue;
        let winner=null;
        const w=cs.find(c=>c.winner===true);
        if(w){ winner = normName(w.team.displayName||w.team.name)===normName(f.home)? f.home : f.away; }
        else { const s0=parseInt(cs[0].score,10), s1=parseInt(cs[1].score,10);
               if(!isNaN(s0)&&!isNaN(s1)) winner = s0===s1? 'Draw' : (s0>s1? names[0]:names[1]);
               if(winner&&winner!=='Draw') winner = normName(winner)===normName(f.home)? f.home : f.away; }
        if(winner && AUTO[f.n]!==winner){ AUTO[f.n]=winner; changed=true; }
      }
    }catch(e){ /* network blocked or endpoint changed; manual flow still works */ }
  }
  AUTO_STATE = sawAny? 'on' : 'unreachable';
  if(changed||backfill){ mergeResults(); rerender(); }
}

document.getElementById('foot').innerHTML='Scoring: Group 3, Round of 32 5, Round of 16 7, Quarter 10, Semi 14, Third 6, Final 20. A correct draw scores the same as a correct win. AI Picks rides along as a benchmark, not a paying entrant. \uD83E\uDD16 = AI benchmark column.<br><b style="color:var(--pitch-dark)">OrbitRemit</b> &middot; Making it Count.';
loadResults();
pollESPN(true);                       // backfill any finished games on first load
setInterval(()=>pollESPN(false), 120000);  // then check today's games every 2 min
if(!ADMIN) setInterval(loadResults, 60000);
</script>
